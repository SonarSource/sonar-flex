name: Build
on:
  push:
    branches:
      - master
      - branch-*
      - dogfood-*
  pull_request:
  merge_group:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: github-ubuntu-latest-s
    permissions:
      id-token: write
      contents: write
      pull-requests: read
    steps:
      - &checkout
        name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - &mise
        name: Setup mise
        uses: jdx/mise-action@e79ddf65a11cec7b0e882bedced08d6e976efb2d # v3.6.2
        with:
          version: 2025.7.12

      - name: Build with Maven
        uses: SonarSource/ci-github-actions/build-maven@v1
        with:
          deploy-pull-request: true
          maven-args: -Pcoverage-report -Dcommercial -T1C
          sonar-platform: next
          artifactory-reader-role: private-reader
          artifactory-deployer-role: qa-deployer

      - name: Upload plugin JAR
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: sonar-flex-plugin
          path: sonar-flex-plugin/target/sonar-flex-plugin-*.jar
          if-no-files-found: error
          retention-days: 1

  windows:
    name: Windows Build
    needs: [build]
    runs-on: windows-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - *checkout
      - *mise
      - name: Build Maven (no deploy)
        uses: SonarSource/ci-github-actions/build-maven@master
        with:
          deploy: false
          artifactory-reader-role: private-reader
          artifactory-deployer-role: qa-deployer
          sonar-platform: none
          maven-args: '-T1C'

  plugin_qa:
    name: Plugin QA (${{ matrix.sq_version }})
    runs-on: github-ubuntu-latest-s
    needs: [build]
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/heads/branch-') || startsWith(github.ref, 'refs/heads/dogfood-')
    permissions:
      id-token: write
      contents: read
    strategy:
      matrix:
        sq_version:
          - LATEST_RELEASE
          - DEV
    steps:
      - *checkout
      - &mise_no_cache
        name: Setup mise
        uses: jdx/mise-action@e79ddf65a11cec7b0e882bedced08d6e976efb2d # v3.6.2
        with:
          version: 2025.7.12
          cache_save: false
      - &download_jar
        name: Download plugin JAR
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          name: sonar-flex-plugin
          path: sonar-flex-plugin/target

      - &secrets
        name: Get secrets from Vault
        id: secrets
        uses: SonarSource/vault-action-wrapper@v3
        with:
          secrets: |
            development/github/token/licenses-ro token | GITHUB_TOKEN;
            development/kv/data/repox url | ARTIFACTORY_URL;
            development/artifactory/token/SonarSource-sonar-flex-private-reader access_token | ARTIFACTORY_ACCESS_TOKEN;

      - name: Run Plugin QA
        env: &qa_env
          GITHUB_TOKEN: ${{ fromJSON(steps.secrets.outputs.vault).GITHUB_TOKEN }}
          ARTIFACTORY_URL: ${{ fromJSON(steps.secrets.outputs.vault).ARTIFACTORY_URL }}
          ARTIFACTORY_ACCESS_TOKEN: ${{ fromJSON(steps.secrets.outputs.vault).ARTIFACTORY_ACCESS_TOKEN }}
        run: |
          cd its/plugin
          mvn verify -Pit-plugin -Dsonar.runtimeVersion=${{ matrix.sq_version }} -Dmaven.test.redirectTestOutputToFile=false -B -e -V

  ruling:
    name: Ruling
    runs-on: github-ubuntu-latest-s
    needs: [build]
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/heads/branch-') || startsWith(github.ref, 'refs/heads/dogfood-')
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          submodules: true
      - *mise_no_cache
      - *download_jar
      - *secrets
      - name: Run Ruling
        env: *qa_env
        run: |
          cd its/ruling
          mvn verify -Pit-ruling -Dsonar.runtimeVersion=LATEST_RELEASE -Dmaven.test.redirectTestOutputToFile=false -B -e -V

  promote:
    name: Promote
    runs-on: github-ubuntu-latest-s
    needs: [build, ruling, plugin_qa]
    if: |
      needs.build.result == 'success' &&
      (github.event_name == 'pull_request' || github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/heads/branch-') || startsWith(github.ref, 'refs/heads/dogfood-'))
    permissions:
      id-token: write
      contents: write
    steps:
      - *checkout
      - *mise_no_cache
      - name: Promote Maven artifacts
        uses: SonarSource/ci-github-actions/promote@v1
        with:
          promote-pull-request: true

  releasability:
    runs-on: github-ubuntu-latest-s
    name: Releasability
    needs:
      - promote
    permissions:
      id-token: write
      statuses: write
      contents: read
    steps:
      - uses: SonarSource/gh-action_releasability/releasability-status@v3
        if: >-
          github.ref_name == github.event.repository.default_branch ||
          startsWith(github.ref_name, 'branch-') ||
          startsWith(github.ref_name, 'dogfood-')
        with:
          optional_checks: "Jira"
        env:
          GITHUB_TOKEN: '${{ secrets.GITHUB_TOKEN }}'
